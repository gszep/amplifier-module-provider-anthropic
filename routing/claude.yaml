# Routing Matrix: claude
# Routes all roles through the OAuth-enabled Anthropic provider.
# Requires this fork mounted as the drop-in "anthropic" provider.

name: claude
description: "Routes all roles through the Anthropic provider."
updated: "2026-03-02"

roles:
  general:
    description: "Versatile catch-all, no specialization needed"
    candidates:
      - provider: anthropic
        model: claude-sonnet-4-6

  fast:
    description: "Quick utility tasks -- parsing, classification, file ops, bulk work"
    candidates:
      - provider: anthropic
        model: claude-haiku-4-5

  coding:
    description: "Code generation, implementation, debugging"
    candidates:
      - provider: anthropic
        model: claude-sonnet-4-6

  ui-coding:
    description: "Frontend/UI code -- components, layouts, styling, spatial reasoning"
    candidates:
      - provider: anthropic
        model: claude-sonnet-4-6

  security-audit:
    description: "Vulnerability assessment, attack surface analysis, code auditing"
    candidates:
      - provider: anthropic
        model: claude-sonnet-4-6
        config:
          reasoning_effort: high

  reasoning:
    description: "Deep architectural reasoning, system design, complex multi-step analysis"
    candidates:
      - provider: anthropic
        model: claude-opus-4-6
        config:
          reasoning_effort: high

  critique:
    description: "Analytical evaluation -- finding flaws in existing work"
    candidates:
      - provider: anthropic
        model: claude-sonnet-4-6
        config:
          reasoning_effort: xhigh

  creative:
    description: "Design direction, aesthetic judgment, high-quality creative output"
    candidates:
      - provider: anthropic
        model: claude-opus-4-6

  writing:
    description: "Long-form content -- documentation, marketing, case studies, storytelling"
    candidates:
      - provider: anthropic
        model: claude-opus-4-6

  research:
    description: "Deep investigation, information synthesis across multiple sources"
    candidates:
      - provider: anthropic
        model: claude-opus-4-6
        config:
          reasoning_effort: high

  vision:
    description: "Understanding visual input -- screenshots, diagrams, UI mockups"
    candidates:
      - provider: anthropic
        model: claude-sonnet-4-6

  image-gen:
    description: "Image generation (limited -- no native image API)"
    candidates:
      - provider: anthropic
        model: claude-opus-4-6

  critical-ops:
    description: "High-reliability operational tasks -- infrastructure, orchestration"
    candidates:
      - provider: anthropic
        model: claude-opus-4-6
